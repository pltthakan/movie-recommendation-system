services:
  db:
    image: pgvector/pgvector:0.8.2-pg16
    environment:
      POSTGRES_DB: film_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Istanbul
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d film_app"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    ports:
      - "5002:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/film_app
      REDIS_URL: redis://redis:6379/0
      AUTO_WARMUP: "0"
      TZ: Europe/Istanbul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - models:/models
      - ./benchmarks:/output
    restart: unless-stopped

  event-worker:
    build: .
    command: python -m app.workers.event_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/film_app
      REDIS_URL: redis://redis:6379/0
      AUTO_WARMUP: "0"
      TZ: Europe/Istanbul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - models:/models
      - ./benchmarks:/output
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20



volumes:
  pgdata:
  models:
  redisdata:
